name: Elixir CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    # Define environment variables once with fallbacks
    env:
      MIX_ENV: test
      DB_USER: ${{ secrets.DB_USER || vars.DB_USER || 'postgres' }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD || vars.DB_PASSWORD || 'postgres_password' }}
      DB_NAME: ${{ secrets.DB_NAME || vars.DB_NAME || 'nexus_test' }}
      DB_HOST: localhost

    services:
      db:
        # Use full TimescaleDB image (PostgreSQL 15 based) to support all time-series features
        image: timescale/timescaledb:latest-pg15
        env:
          POSTGRES_USER: ${{ env.DB_USER }}
          POSTGRES_PASSWORD: ${{ env.DB_PASSWORD }}
          # Set a default DB that is NOT the test DB to avoid conflicts with mix ecto.create
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5" # Matches your local Elixir version
          otp-version: "28.1" # Matches your local OTP version

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check Code Format
        run: mix format --check-formatted

      - name: Security Scan (Sobelow)
        run: mix sobelow --config

      - name: Initialize and Run Feature Tests (Gherkin/Cabbage)
        run: |
          # 1. Create the database (non-failing if exists)
          mix ecto.create || true

          # 2. Ensure event_store schema exists (Ecto create doesn't do this)
          # We use mix run -e to avoid installing psql client
          mix run -e "Nexus.Repo.start_link(); Ecto.Adapters.SQL.query!(Nexus.Repo, \"CREATE SCHEMA IF NOT EXISTS event_store;\")"

          # 3. Initialize EventStore tables
          mix event_store.init -e Nexus.EventStore

          # 4. Run migrations
          mix ecto.migrate

          # 5. Run feature tests
          mix test.features

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "Dumping service container logs..."
          docker logs $(docker ps -qf "name=db") || true
          echo "Checking for application-specific logs..."
          [ -d priv/log ] && ls -R priv/log && cat priv/log/*.log || echo "No app logs found in priv/log"
